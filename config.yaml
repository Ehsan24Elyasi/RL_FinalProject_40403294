project:
  student_id: "40403294"
  base_seed: 9
maze:
  size: 16
  source_map: environments/maps/source.json
  intended_probability: 0.8
  perpendicular_slip_probability: 0.1
  max_steps_multiplier: 3
rewards:
  step: -0.1
  collision_extra: -0.9
  penalty_extra: -1.9
  first_key: 5.0
  goal: 20.0
shaping:
  method: normalized_completion_distance
  version: 1
  scale: 1.0
planning:
  theta: 1.0e-10
  max_sweeps: 100000
  tie_tolerance: 1.0e-10
  output_dir: results/models/value_iteration
  required_runs:
    - reward_mode: shaped
      gamma: 0.90
    - reward_mode: shaped
      gamma: 0.95
    - reward_mode: shaped
      gamma: 0.99
    - reward_mode: sparse
      gamma: 0.95
q_learning:
  gamma: 0.95
  alpha: 0.1
  episodes: 5000
  epsilon_start: 1.0
  epsilon_end: 0.05
  decay_episodes: 4000
  audit_episode: 1
  model_dir: results/models/q_learning
  raw_dir: results/raw/q_learning
  required_runs:
    - reward_mode: shaped
      schedule: linear
      seed: 9
      episodes: 5000
    - reward_mode: shaped
      schedule: exponential
      seed: 9
      episodes: 5000
