schema_version: 1
preset:
  name: final-q
  kind: final
  description: Locked final source-map Q-Learning matrix across five fixed seeds.
  project_config: ../../config.yaml
  output_subdir: final-q
execution:
  require_confirmation: true
  confirmation_flag: --confirm-final
  sequential: true
  resume: true
seeds:
  roots: [9, 109, 209, 309, 409]
  stream_derivation: numpy-seedsequence-spawn-v1
  stream_order:
    - training_action_choice
    - training_transitions
    - evaluation_tie_breaking
    - evaluation_transitions
    - statistics
evaluation:
  policy: greedy_exact_max_uniform_ties
  common_rollout_group: source-final-v1
  rollouts: 100
  max_steps: inherit
  preserve_arrays: true
  record_trajectories: []
audits:
  event_coverage: true
  q_step_audits: []
  sarsa_trace_diagnostics: []
matrix:
  value_iteration:
    defaults: {}
    variants: []
  q_learning:
    defaults:
      map: source
      gamma: 0.95
      alpha: 0.1
      episodes: 5000
      epsilon_start: 1.0
      epsilon_end: 0.05
      decay_episodes: 4000
      audit_episode: null
    variants:
      - {slot: q-shaped-linear, reward_mode: shaped, schedule: linear}
      - {slot: q-shaped-exponential, reward_mode: shaped, schedule: exponential}
      - {slot: q-sparse-linear, reward_mode: sparse, schedule: linear}
  sarsa_lambda:
    defaults: {}
    variants: []
  transfer_q_learning:
    defaults: {}
    target_roles: []
    initializations: []
expected_counts:
  vi_solves: 0
  q_runs: 15
  sarsa_runs: 0
  transfer_slots: 0
  ready_slots: 15
  unavailable_slots: 0
  total_slots: 15
confirmation_metadata:
  final_preset: true
  required_cli_flag: --confirm-final
  approved_matrix: phase-9-locked-final
