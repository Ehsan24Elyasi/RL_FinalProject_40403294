schema_version: 1
preset:
  name: final-transfer
  kind: final
  description: Locked final transfer matrix represented as unavailable until Phase 6.
  project_config: ../../config.yaml
  output_subdir: final-transfer
execution:
  require_confirmation: true
  confirmation_flag: --confirm-final
  sequential: true
  resume: true
seeds:
  roots: [9, 109, 209, 309, 409]
  stream_derivation: numpy-seedsequence-spawn-v1
  stream_order:
    - training_action_choice
    - training_transitions
    - evaluation_tie_breaking
    - evaluation_transitions
    - statistics
evaluation:
  policy: greedy_exact_max_uniform_ties
  common_rollout_group: transfer-final-v1
  rollouts: 100
  max_steps: inherit
  preserve_arrays: true
  record_trajectories: []
  transfer_checkpoints:
    initial_rollouts: 100
    final_rollouts: 100
    interval_episodes: 250
    checkpoint_rollouts: 20
    include_initial: true
    include_final: true
audits:
  event_coverage: true
  q_step_audits: []
  sarsa_trace_diagnostics: []
matrix:
  value_iteration:
    defaults: {}
    variants: []
  q_learning:
    defaults: {}
    variants: []
  sarsa_lambda:
    defaults: {}
    variants: []
  transfer_q_learning:
    defaults:
      source_map: source
      episodes: 3000
      reward_mode: shaped
      gamma: 0.95
      alpha: 0.1
      schedule: linear
      epsilon_start: 1.0
      epsilon_end: 0.05
      decay_episodes: 2400
      audit_episode: null
      status: unavailable
      unavailable_reason: Phase 6 target maps and transfer initialization are not implemented or frozen.
    target_roles:
      - {role: similar, map: ../../environments/maps/target_similar.json}
      - {role: different, map: ../../environments/maps/target_different.json}
    initializations:
      - {name: scratch}
      - {name: full}
      - {name: scaled, beta: 0.5}
      - {name: selective, signature: phase-aware-3x3-with-teleporter-partner}
expected_counts:
  vi_solves: 0
  q_runs: 0
  sarsa_runs: 0
  transfer_slots: 40
  ready_slots: 0
  unavailable_slots: 40
  total_slots: 40
confirmation_metadata:
  final_preset: true
  required_cli_flag: --confirm-final
  approved_matrix: phase-9-locked-final
