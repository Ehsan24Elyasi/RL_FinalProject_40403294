schema_version: 1
preset:
  name: smoke
  kind: smoke
  description: Bounded source-map coverage of every executable algorithm variant, plus visible Phase 6 transfer placeholders.
  project_config: ../../config.yaml
  output_subdir: smoke
execution:
  require_confirmation: false
  confirmation_flag: null
  sequential: true
  resume: true
seeds:
  roots: [9]
  stream_derivation: numpy-seedsequence-spawn-v1
  stream_order:
    - training_action_choice
    - training_transitions
    - evaluation_tie_breaking
    - evaluation_transitions
    - statistics
evaluation:
  policy: greedy_exact_max_uniform_ties
  common_rollout_group: source-smoke-v1
  rollouts: 1
  max_steps: inherit
  preserve_arrays: true
  record_trajectories:
    - slot: vi-shaped-gamma-0.95
      rollout: 0
audits:
  event_coverage: true
  q_step_audits:
    - slot: q-shaped-linear
      episode: 1
  sarsa_trace_diagnostics:
    - slot: sarsa-shaped-linear-lambda-0.0
      episode: 1
      write_active_traces: true
matrix:
  value_iteration:
    defaults:
      map: source
      theta: inherit
      max_sweeps: inherit
      tie_tolerance: inherit
    variants:
      - {slot: vi-shaped-gamma-0.90, reward_mode: shaped, gamma: 0.90}
      - {slot: vi-shaped-gamma-0.95, reward_mode: shaped, gamma: 0.95}
      - {slot: vi-shaped-gamma-0.99, reward_mode: shaped, gamma: 0.99}
      - {slot: vi-sparse-gamma-0.95, reward_mode: sparse, gamma: 0.95}
  q_learning:
    defaults:
      map: source
      gamma: 0.95
      alpha: 0.1
      episodes: 5
      epsilon_start: 1.0
      epsilon_end: 0.05
      decay_episodes: 5
      audit_episode: null
    variants:
      - {slot: q-shaped-linear, reward_mode: shaped, schedule: linear}
      - {slot: q-shaped-exponential, reward_mode: shaped, schedule: exponential}
      - {slot: q-sparse-linear, reward_mode: sparse, schedule: linear}
  sarsa_lambda:
    defaults:
      map: source
      reward_mode: shaped
      schedule: linear
      gamma: 0.95
      alpha: 0.1
      episodes: 5
      epsilon_start: 1.0
      epsilon_end: 0.05
      decay_episodes: 5
      diagnostic_episode: null
      write_active_traces: false
    variants:
      - {slot: sarsa-shaped-linear-lambda-0.0, lambda: 0.0}
      - {slot: sarsa-shaped-linear-lambda-0.3, lambda: 0.3}
      - {slot: sarsa-shaped-linear-lambda-0.7, lambda: 0.7}
      - {slot: sarsa-shaped-linear-lambda-0.9, lambda: 0.9}
  transfer_q_learning:
    defaults:
      source_map: source
      episodes: 3000
      gamma: 0.95
      alpha: 0.1
      schedule: linear
      epsilon_start: 1.0
      epsilon_end: 0.05
      decay_episodes: 2400
      status: unavailable
      unavailable_reason: Phase 6 target maps and transfer initialization are not implemented or frozen.
    target_roles:
      - {role: similar, map: ../../environments/maps/target_similar.json}
      - {role: different, map: ../../environments/maps/target_different.json}
    initializations:
      - {name: scratch}
      - {name: full}
      - {name: scaled, beta: 0.5}
      - {name: selective, signature: phase-aware-3x3-with-teleporter-partner}
expected_counts:
  vi_solves: 4
  q_runs: 3
  sarsa_runs: 4
  transfer_slots: 8
  ready_slots: 11
  unavailable_slots: 8
  total_slots: 19
confirmation_metadata:
  final_preset: false
  required_cli_flag: null
  approved_matrix: phase-5-smoke
